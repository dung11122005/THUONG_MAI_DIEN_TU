<!DOCTYPE html>
<html class="no-js" lang="zxx">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Courses | Education</title>
    <meta name="description" content="" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="shortcut icon" type="image/x-icon" href="/img/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- CSS here -->
    <link rel="stylesheet" href="/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/owl.carousel.min.css" />
    <link rel="stylesheet" href="/css/slicknav.css" />
    <link rel="stylesheet" href="/css/flaticon.css" />
    <link rel="stylesheet" href="/css/progressbar_barfiller.css" />
    <link rel="stylesheet" href="/css/gijgo.css" />
    <link rel="stylesheet" href="/css/animate.min.css" />
    <link rel="stylesheet" href="/css/animated-headline.css" />
    <link rel="stylesheet" href="/css/magnific-popup.css" />
    <link rel="stylesheet" href="/css/fontawesome-all.min.css" />
    <link rel="stylesheet" href="/css/themify-icons.css" />
    <link rel="stylesheet" href="/css/slick.css" />
    <link rel="stylesheet" href="/css/nice-select.css" />
    <link rel="stylesheet" href="/css/style.css" />

    <style>
      .header-area {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 9999;
        background-color: #ffffff !important; /* Nền trắng rõ ràng */
        color: #000000 !important; /* Chữ đen rõ ràng */
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1); /* Đổ bóng nhẹ cho nổi */
      }

      .header-transparent {
        background-color: #fff !important; /* Gỡ hiệu ứng trong suốt */
      }

      body {
        padding-top: 100px; /* Đẩy nội dung xuống dưới header để không bị che */
      }

      a:hover {
        color: #000 !important; /* hoặc màu khác rõ ràng */
        text-decoration: underline;
      }
      .properties__img,
      .overlay1 {
        overflow: hidden;
        position: relative;
        border-radius: 12px; /* hoặc giá trị bạn mong muốn */
      }

      .properties__img img {
        display: block;
        width: 100%;
        height: auto;
        object-fit: cover;
        border-radius: inherit; /* Kế thừa border-radius từ thẻ cha */
      }

      @media (max-width: 991px) {
        .mobile_menu .dropdown-menu {
          display: block !important; /* Luôn hiển thị khi mở menu mobile */
          position: static !important; /* Bỏ absolute để nằm trong luồng */
          float: none !important;
          background: #fff !important; /* Đổi nền trắng để thấy chữ */
          border: none !important;
          box-shadow: none !important;
          padding-left: 20px; /* thụt vào để thấy cấp con */
        }
        .mobile_menu .dropdown-item {
          color: #000 !important; /* Đổi chữ thành đen */
          padding: 8px 0;
        }
      }

      .mobile_menu ul li a {
        display: block;
        padding: 20px; /* padding cố định nhỏ */
        line-height: 1; /* làm nút thấp */
      }
    </style>
  </head>

  <body>
    <!-- ? Preloader Start -->
    <div id="preloader-active">
      <div class="preloader d-flex align-items-center justify-content-center">
        <div class="preloader-inner position-relative">
          <div class="preloader-circle"></div>
          <div class="preloader-img pere-text">
            <img src="/img/logo/loder.png" alt="" />
          </div>
        </div>
      </div>
    </div>
    <!-- Preloader Start -->
    <!-- Header Start -->
    <div th:replace="client/layout/header"></div>
    <!-- Header End -->
    <main>
      <section class="py-5">
        <div class="container">
          <h2 class="text-center mb-4">Xác nhận khóa học đã chọn</h2>

          <!-- Thông báo lỗi nếu không có khóa học -->
          <div th:if="${error}" class="alert alert-warning text-center">
            <strong th:text="${error}"></strong>
          </div>

          <form th:action="@{/cart/purchase}" method="post">
            <!-- Bảng khóa học -->
            <div
              th:if="${!#lists.isEmpty(selectedCourses)}"
              class="table-responsive"
            >
              <table class="table table-bordered align-middle text-center">
                <thead class="table-light">
                  <tr>
                    <th style="width: 60px">#</th>
                    <th style="min-width: 300px">Khóa học</th>
                    <th style="width: 180px">Giá</th>
                  </tr>
                </thead>
                <tbody>
                  <tr th:each="course, iterStat : ${selectedCourses}">
                    <td th:text="${iterStat.index + 1}" class="fw-bold"></td>

                    <td class="text-start">
                      <div class="d-flex align-items-center gap-3">
                        <img
                          th:src="@{/uploads/images/avatarcourses/{img}(img=${course.thumbnail})}"
                          alt="Course Image"
                          style="
                            width: 90px;
                            height: 65px;
                            object-fit: cover;
                            border-radius: 8px;
                          "
                        />
                        <div>
                          <p
                            th:text="${course.name}"
                            class="mb-1 fw-bold fs-5"
                          ></p>
                          <small
                            th:text="${course.teacher.fullName}"
                            class="text-muted"
                          ></small>
                        </div>
                      </div>
                      <!-- input ẩn -->
                      <input
                        type="hidden"
                        name="courseIds"
                        th:value="${course.id}"
                      />
                    </td>

                    <td>
                      <span
                        th:if="${course.isFree}"
                        class="badge bg-success fs-6"
                        >Free</span
                      >
                      <span
                        th:unless="${course.isFree}"
                        th:text="${#numbers.formatDecimal(course.price,0,'COMMA',0,'POINT')} + ' VNĐ'"
                        class="fw-bold fs-5 text-danger"
                      ></span>
                    </td>
                  </tr>
                </tbody>

                <!-- Tổng tiền -->
                <tfoot>
                  <tr class="table-light">
                    <td colspan="2" class="text-end fw-bold fs-5">
                      Tổng cộng:
                    </td>
                    <td class="fw-bold fs-5 text-primary">
                      <span
                        th:text="${#numbers.formatDecimal(totalPrice,0,'COMMA',0,'POINT')} + ' VNĐ'"
                      ></span>
                    </td>
                  </tr>
                </tfoot>
              </table>
            </div>

            <!-- Chọn hình thức thanh toán -->
            <div class="mb-4">
              <label class="form-label fw-bold"
                >Chọn phương thức thanh toán:</label
              ><br />
              <div class="form-check">
                <input
                  class="form-check-input payment-option"
                  type="radio"
                  name="paymentMethod"
                  id="paypal"
                  value="PAYPAL"
                  checked
                />
                <label class="form-check-label" for="paypal">PayPal</label>
              </div>
              <div class="form-check">
                <input
                  class="form-check-input payment-option"
                  type="radio"
                  name="paymentMethod"
                  id="vnpay"
                  value="VNPAY"
                />
                <label class="form-check-label" for="vnpay">VNPAY</label>
              </div>
            </div>

            <div class="text-end">
              <button type="submit" class="btn btn-success btn-lg w-100">
                Xác nhận và thanh toán
              </button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <footer>
      <div th:replace="client/layout/footer"></div>
    </footer>
    <!-- Scroll Up -->
    <div id="back-top">
      <a title="Go to Top" href="#"> <i class="fas fa-level-up-alt"></i></a>
    </div>

    <!-- JS here -->
    <script src="/js/vendor/modernizr-3.5.0.min.js"></script>
    <!-- Jquery, Popper, Bootstrap -->
    <script src="/js/vendor/jquery-1.12.4.min.js"></script>
    <script src="/js/popper.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <!-- Jquery Mobile Menu -->
    <script src="/js/jquery.slicknav.min.js"></script>

    <!-- Jquery Slick , Owl-Carousel Plugins -->
    <script src="/js/owl.carousel.min.js"></script>
    <script src="/js/slick.min.js"></script>
    <!-- One Page, Animated-HeadLin -->
    <script src="/js/wow.min.js"></script>
    <script src="/js/animated.headline.js"></script>
    <script src="/js/jquery.magnific-popup.js"></script>

    <!-- Date Picker -->
    <script src="/js/gijgo.min.js"></script>
    <!-- Nice-select, sticky -->
    <script src="/js/jquery.nice-select.min.js"></script>
    <script src="/js/jquery.sticky.js"></script>
    <!-- Progress -->
    <script src="/js/jquery.barfiller.js"></script>

    <!-- counter , waypoint,Hover Direction -->
    <script src="/js/jquery.counterup.min.js"></script>
    <script src="/js/waypoints.min.js"></script>
    <script src="/js/jquery.countdown.min.js"></script>
    <script src="/js/hover-direction-snake.min.js"></script>

    <!-- contact js -->
    <script src="/js/contact.js"></script>
    <script src="/js/jquery.form.js"></script>
    <script src="/js/jquery.validate.min.js"></script>
    <script src="/js/mail-script.js"></script>
    <script src="/js/jquery.ajaxchimp.min.js"></script>

    <!-- Jquery Plugins, main Jquery -->
    <script src="/js/plugins.js"></script>
    <script src="/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
